  synopsis: |-
    A noble lady wakes beneath the quiet weight of a ruined reputation, a cold teacup, and a future everyone has already decided for her.

    But this time, she will not beg for affection. She will not chase the prince. She will sit by the window, pour herself another cup of tea, and choose her own ending.
